services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  ml-service:
    build: ./ml-service
    container_name: ml-service
    environment:
      - PORT=8000
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/disease_risk_db
      - ML_SERVICE_URL=http://ml-service:8000
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongo
      - ml-service
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
